<!DOCTYPE html>

<html class="dark" lang="es"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Agregar Gasto - Luminal Home</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;family=Manrope:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "surface-dim": "#131315",
              "secondary-fixed-dim": "#3ce36a",
              "on-secondary-fixed": "#002108",
              "on-background": "#e5e1e4",
              "tertiary": "#ffb3ae",
              "primary-fixed-dim": "#cdbdff",
              "on-primary-fixed-variant": "#4f00d0",
              "on-error-container": "#ffdad6",
              "on-primary-fixed": "#20005f",
              "primary-container": "#7c4dff",
              "on-tertiary": "#68000c",
              "on-surface-variant": "#cac3d8",
              "outline": "#948ea1",
              "inverse-on-surface": "#303032",
              "secondary-fixed": "#69ff87",
              "on-surface": "#e5e1e4",
              "tertiary-fixed-dim": "#ffb3ae",
              "outline-variant": "#494455",
              "on-primary": "#370096",
              "error": "#ffb4ab",
              "on-tertiary-container": "#fff6f5",
              "on-primary-container": "#fcf6ff",
              "tertiary-fixed": "#ffdad7",
              "surface-container-highest": "#353437",
              "tertiary-container": "#d53338",
              "surface-variant": "#353437",
              "on-secondary": "#003912",
              "surface": "#131315",
              "surface-container-high": "#2a2a2c",
              "surface-container-lowest": "#0e0e10",
              "primary-fixed": "#e8deff",
              "error-container": "#93000a",
              "surface-container": "#201f21",
              "primary": "#cdbdff",
              "inverse-surface": "#e5e1e4",
              "inverse-primary": "#6833ea",
              "surface-container-low": "#1b1b1d",
              "on-tertiary-fixed-variant": "#930015",
              "on-tertiary-fixed": "#410004",
              "secondary": "#40e56c",
              "surface-bright": "#39393b",
              "on-secondary-container": "#004d1b",
              "secondary-container": "#02c953",
              "on-error": "#690005",
              "on-secondary-fixed-variant": "#00531e",
              "surface-tint": "#cdbdff",
              "background": "#131315"
            },
            fontFamily: {
              "headline": ["Plus Jakarta Sans"],
              "body": ["Manrope"],
              "label": ["Manrope"]
            },
            borderRadius: {"DEFAULT": "0.75rem", "lg": "1rem", "xl": "1.25rem", "full": "9999px"},
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .hide-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .hide-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
    </style>
</head>
<body class="bg-surface font-body text-on-surface selection:bg-primary/30 min-h-screen flex flex-col">
<!-- Header Navigation -->
<header class="bg-[#131315] sticky top-0 z-50 flex justify-between items-center px-6 py-4 w-full">
<button class="w-12 h-12 flex items-center justify-center rounded-xl bg-surface-container-high text-on-surface hover:opacity-80 transition-opacity active:scale-95 duration-200">
<span class="material-symbols-outlined" data-icon="close">close</span>
</button>
<h1 class="font-headline font-bold text-xl text-[#cdbdff]">Agregar Gasto</h1>
<div class="w-12"></div> <!-- Spacer for balance -->
</header>
<main class="flex-1 px-6 pt-4 pb-12 max-w-2xl mx-auto w-full">
<!-- Input Section: Name and Amount -->
<section class="space-y-6 mb-10">
<div class="relative group">
<label class="block text-xs font-label font-semibold uppercase tracking-widest text-outline mb-2 ml-1">Nombre del gasto</label>
<input class="w-full bg-surface-container-lowest border-none rounded-xl px-6 py-5 text-lg font-medium placeholder:text-outline-variant focus:ring-2 focus:ring-primary/20 focus:outline-none transition-all duration-300" placeholder="Ej. Supermercado Mensual" type="text"/>
</div>
<div class="relative group">
<label class="block text-xs font-label font-semibold uppercase tracking-widest text-outline mb-2 ml-1">Monto</label>
<div class="relative flex items-center">
<span class="absolute left-6 text-2xl font-headline font-bold text-primary-fixed-dim">$</span>
<input class="w-full bg-surface-container-lowest border-none rounded-xl pl-12 pr-6 py-6 text-4xl font-headline font-extrabold text-on-surface placeholder:text-surface-container-highest focus:ring-2 focus:ring-primary/20 focus:outline-none transition-all duration-300" placeholder="0.00" type="number"/>
</div>
</div>
</section>
<!-- Payment Method Horizontal Selection -->
<section class="mb-10">
<label class="block text-xs font-label font-semibold uppercase tracking-widest text-outline mb-4 ml-1">Método de pago</label>
<div class="grid grid-cols-3 gap-3 w-full pb-2">
<button class="flex-shrink-0 flex items-center gap-3 px-6 py-4 rounded-xl bg-primary-container text-on-primary-container shadow-[0_4px_20px_rgba(124,77,255,0.3)] transition-all active:scale-95 flex-col justify-center items-center aspect-square"><span class="material-symbols-outlined mb-2" data-icon="payments">payments</span><span class="font-semibold text-xs uppercase tracking-tight">Efectivo</span></button>
<button class="flex-shrink-0 flex items-center gap-3 px-6 py-4 rounded-xl bg-surface-container-low text-on-surface-variant hover:bg-surface-container transition-all active:scale-95 flex-col justify-center items-center aspect-square"><span class="material-symbols-outlined mb-2" data-icon="credit_card">credit_card</span><span class="font-semibold text-xs uppercase tracking-tight text-on-surface">Tarjeta</span></button>
<button class="flex-shrink-0 flex items-center gap-3 px-6 py-4 rounded-xl bg-surface-container-low text-on-surface-variant hover:bg-surface-container transition-all active:scale-95 flex-col justify-center items-center aspect-square"><span class="material-symbols-outlined mb-2" data-icon="account_balance">account_balance</span><span class="font-semibold text-xs uppercase tracking-tight text-on-surface">Banco</span></button>
</div>
</section>
<!-- Categories Grid -->
<section class="mb-12">
<label class="block text-xs font-label font-semibold uppercase tracking-widest text-outline mb-4 ml-1">Categoría</label>
<div class="grid grid-cols-3 gap-4">
<!-- Category: Vivienda -->
<button class="group flex flex-col items-center justify-center aspect-square rounded-xl bg-surface-container-low hover:bg-surface-container transition-all active:scale-95 p-4 border-2 border-transparent hover:border-primary/10">
<div class="w-12 h-12 rounded-xl bg-primary/10 flex items-center justify-center text-primary mb-3 group-hover:scale-110 transition-transform">
<span class="material-symbols-outlined" data-icon="home">home</span>
</div>
<span class="text-xs font-bold text-on-surface-variant group-hover:text-on-surface">Vivienda</span>
</button>
<!-- Category: Alimentación -->
<button class="group flex flex-col items-center justify-center aspect-square rounded-xl bg-surface-container-low hover:bg-surface-container transition-all active:scale-95 p-4 border-2 border-transparent hover:border-primary/10">
<div class="w-12 h-12 rounded-xl bg-secondary/10 flex items-center justify-center text-secondary mb-3 group-hover:scale-110 transition-transform">
<span class="material-symbols-outlined" data-icon="restaurant">restaurant</span>
</div>
<span class="text-xs font-bold text-on-surface-variant group-hover:text-on-surface">Alimentación</span>
</button>
<!-- Category: Transporte -->
<button class="group flex flex-col items-center justify-center aspect-square rounded-xl bg-surface-container-low hover:bg-surface-container transition-all active:scale-95 p-4 border-2 border-transparent hover:border-primary/10">
<div class="w-12 h-12 rounded-xl bg-blue-400/10 flex items-center justify-center text-blue-400 mb-3 group-hover:scale-110 transition-transform">
<span class="material-symbols-outlined" data-icon="directions_car">directions_car</span>
</div>
<span class="text-xs font-bold text-on-surface-variant group-hover:text-on-surface">Transporte</span>
</button>
<!-- Category: Ocio -->
<button class="group flex flex-col items-center justify-center aspect-square rounded-xl bg-surface-container-low hover:bg-surface-container transition-all active:scale-95 p-4 border-2 border-transparent hover:border-primary/10">
<div class="w-12 h-12 rounded-xl bg-tertiary/10 flex items-center justify-center text-tertiary mb-3 group-hover:scale-110 transition-transform">
<span class="material-symbols-outlined" data-icon="movie">movie</span>
</div>
<span class="text-xs font-bold text-on-surface-variant group-hover:text-on-surface">Ocio</span>
</button>
<!-- Category: Salud -->
<button class="group flex flex-col items-center justify-center aspect-square rounded-xl bg-surface-container-low hover:bg-surface-container transition-all active:scale-95 p-4 border-2 border-transparent hover:border-primary/10">
<div class="w-12 h-12 rounded-xl bg-error/10 flex items-center justify-center text-error mb-3 group-hover:scale-110 transition-transform">
<span class="material-symbols-outlined" data-icon="medical_services">medical_services</span>
</div>
<span class="text-xs font-bold text-on-surface-variant group-hover:text-on-surface">Salud</span>
</button>
<!-- Category: Otros -->
<button class="group flex flex-col items-center justify-center aspect-square rounded-xl bg-surface-container-low hover:bg-surface-container transition-all active:scale-95 p-4 border-2 border-transparent hover:border-primary/10">
<div class="w-12 h-12 rounded-xl bg-outline/10 flex items-center justify-center text-outline mb-3 group-hover:scale-110 transition-transform">
<span class="material-symbols-outlined" data-icon="more_horiz">more_horiz</span>
</div>
<span class="text-xs font-bold text-on-surface-variant group-hover:text-on-surface">Otros</span>
</button>
<!-- Action: Añadir categoría nueva -->
<button class="col-span-3 mt-2 flex items-center justify-center gap-3 p-5 rounded-xl border-2 border-dashed border-outline-variant hover:border-primary/40 hover:bg-primary/5 transition-all text-outline-variant hover:text-primary active:scale-[0.98]">
<span class="material-symbols-outlined" data-icon="add_circle">add_circle</span>
<span class="font-bold text-sm tracking-wide">Añadir categoría nueva</span>
</button>
</div>
</section>
<!-- Main Submission Button -->
<div class="sticky bottom-8 mt-auto pt-6">
<button class="w-full bg-gradient-to-br from-primary to-primary-container py-5 rounded-xl shadow-[0_12px_48px_rgba(124,77,255,0.25)] flex items-center justify-center gap-3 active:scale-95 transition-all">
<span class="material-symbols-outlined font-bold" data-icon="check_circle" style="font-variation-settings: 'FILL' 1;">check_circle</span>
<span class="font-headline font-extrabold text-lg tracking-tight text-on-primary">Guardar</span>
</button>
<p class="text-center text-outline-variant text-[11px] mt-4 font-medium uppercase tracking-[0.2em]">Se registrará automáticamente en tu historial</p>
</div>
</main>
<!-- Visual Polish: Background Aura -->
<div class="fixed top-[-10%] left-[-10%] w-[40%] h-[40%] bg-primary/5 blur-[120px] rounded-full pointer-events-none -z-10"></div>
<div class="fixed bottom-[-5%] right-[-5%] w-[30%] h-[30%] bg-secondary/5 blur-[100px] rounded-full pointer-events-none -z-10"></div>
</body></html>
